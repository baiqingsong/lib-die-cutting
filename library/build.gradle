plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    compileSdk 34

    defaultConfig {
        minSdk 28
        targetSdk 34

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"

        // 模切机 SDK 包含 armeabi-v7a / arm64-v8a 的原生串口库
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.baiqingsong'
                artifactId = 'lib-die-cutting'
            }
        }
    }
}

// ===== 配置阶段自动安装 CutSDK.aar 到本地 Maven（依赖解析前执行）=====
def m2Repo = file("${System.getProperty('user.home')}/.m2/repository/com/hszn/cutsdk/1.0.0")
def pomFile = file("${m2Repo}/cutsdk-1.0.0.pom")
if (!pomFile.exists()) {
    def aarFile = file('libs/CutSDK.aar')
    if (aarFile.exists()) {
        println '>>> 安装 CutSDK.aar 到本地 Maven...'
        m2Repo.mkdirs()
        copy { from aarFile; into m2Repo; rename { 'cutsdk-1.0.0.aar' } }
        pomFile.text = '<?xml version="1.0" encoding="UTF-8"?>\n' +
            '<project xmlns="http://maven.apache.org/POM/4.0.0"\n' +
            '         xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"\n' +
            '         xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">\n' +
            '  <modelVersion>4.0.0</modelVersion>\n' +
            '  <groupId>com.hszn</groupId>\n' +
            '  <artifactId>cutsdk</artifactId>\n' +
            '  <version>1.0.0</version>\n' +
            '  <packaging>aar</packaging>\n' +
            '</project>\n'
        println '>>> CutSDK 安装完成'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // CutSDK.aar 内部依赖 Gson
    implementation 'com.google.code.gson:gson:2.8.9'

    // 打印切割一体机 SDK（MainSDK，USB HID）
    // 统一走 mavenLocal 坐标，配置阶段自动从 libs/CutSDK.aar 安装
    api 'com.hszn:cutsdk:1.0.0'
}
