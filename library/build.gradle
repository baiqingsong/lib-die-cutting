plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    compileSdk 34

    defaultConfig {
        minSdk 28
        targetSdk 34

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"

        // 模切机 SDK 包含 armeabi-v7a / arm64-v8a 的原生串口库
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.baiqingsong'
                artifactId = 'lib-die-cutting'
            }
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // CutSDK.aar 内部依赖 Gson
    implementation 'com.google.code.gson:gson:2.8.9'

    // 打印切割一体机 SDK（MainSDK，USB HID）
    // 本地开发：useLocalAar=true → 直接用 libs/CutSDK.aar
    // JitPack  ：before_install 安装到 mavenLocal → maven 坐标
    if (findProperty('useLocalAar') == 'true') {
        api files('libs/CutSDK.aar')
    } else {
        api 'com.hszn:cutsdk:1.0.0'
    }
}
