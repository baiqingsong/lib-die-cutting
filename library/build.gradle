plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    compileSdk 34

    defaultConfig {
        minSdk 28
        targetSdk 34

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"

        // 模切机 SDK 包含 armeabi-v7a / arm64-v8a 的原生串口库
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // 引入本地 AAR 依赖
    repositories {
        flatDir {
            dirs 'libs'
        }
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.baiqingsong'
                artifactId = 'lib-die-cutting'
            }
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // 模切机厂商 SDK - 串口刻绘版（CutSDKManager，纯切割/刻绘机）
    api files('libs/CutSDKManager.aar')

    // 打印切割一体机 SDK（CutSDK.aar，含 MainSDK/InputInfo/ReturnInfo）
    // 需要从厂商获取 CutSDK.aar 放入 libs 目录，然后取消下面注释：
    // implementation files('libs/CutSDK.aar')
}
